[workspace]
name = "needlestack-core"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "win-64"]

[dependencies]
python = "3.12.*"
pip = "*"

[pypi-dependencies]
needlestack-core = { path = ".", editable = true }

[tasks]
test = "python -m pytest"
# Release-gate cadence only, not part of `test` above — coverage is a
# floor-check, not a quality gate.
test-cov = "python -m pytest --cov --cov-report=term-missing"
